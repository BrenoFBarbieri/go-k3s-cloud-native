---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: go-api
spec:
    replicas: 1
    selector:
        matchLabels:
            app: go-api
    template:
        metadata:
            labels:
                app: go-api
        spec:
            containers:
                - name: go-api
                  image: registry:5000/go-api:v1
                  imagePullPolicy: Always
                  envFrom:
                      - configMapRef:
                            name: go-api-config
                      - secretRef:
                            name: go-api-secret
                  ports:
                      - containerPort: 8080
                  # Check if the application is ready for traffic
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 8080
                      initialDelaySeconds: 5
                      periodSeconds: 10
                  # Checks if the application is still active
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 8080
                      initialDelaySeconds: 10
                      periodSeconds: 15
